<!DOCTYPE html>
<html lang="pt-BR">
<head>

<script src="/theme-init.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Tab</title>
</head>
<body>

<div class="header flex items-center justify-end mb-7">
  <div class="flex gap-2 items-center">
    <input
      id="search"
      type="text"
      data-i18n-placeholder="searchPlaceholder"
      autocomplete="off"
      class="input input-bordered input-sm w-80 bg-base-content/5 border-base-content/10 focus:border-base-content/25 placeholder:text-base-content/40"

    <button id="btn-shuffle" class="btn btn-sm bg-base-content/5 border-base-content/10 hover:bg-base-content/15 hover:border-base-content/20" data-i18n-title="shuffle"></button>
    <button id="btn-settings" class="btn btn-sm btn-square bg-base-content/5 border-base-content/10 hover:bg-base-content/15 hover:border-base-content/20" data-i18n-title="manageSections" data-i18n-aria-label="manageSections"></button>

<div id="app"></div>

<script type="module" src="/src/main.ts"></script>
