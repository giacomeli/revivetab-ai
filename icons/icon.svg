<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- ReviveTab AI — aba inclinada (movimento) + sparkle de 4 pontas (IA)
       cortando a borda da aba (vitalidade). Degradê roxo eletrico -> ciano
       sobre fundo escuro, harmonizado com o tema da extensao. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1222"/>
      <stop offset="0.6" stop-color="#1a1040"/>
      <stop offset="1" stop-color="#2d1b4e"/>
    </linearGradient>
    <linearGradient id="tab" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- aba do browser, levemente inclinada -->
  <g transform="rotate(-6 60 70)">
    <path d="M22 46
             q0 -10 10 -10
             h18 q6 0 9 6 l3 5 h32
             q10 0 10 10
             v30 q0 10 -10 10
             H32 q-10 0 -10 -10 z"
          fill="rgba(255,255,255,0.05)"
          stroke="url(#tab)" stroke-width="7" stroke-linejoin="round"/>
    <!-- linha de conteudo da aba -->
    <rect x="34" y="66" width="34" height="7" rx="3.5" fill="url(#tab)" opacity="0.55"/>
    <rect x="34" y="80" width="22" height="7" rx="3.5" fill="url(#tab)" opacity="0.35"/>
  </g>

  <!-- sparkle principal cortando a borda superior direita da aba -->
  <path d="M95 22 l7 19 19 7 -19 7 -7 19 -7 -19 -19 -7 19 -7 z" fill="url(#spark)"/>
  <!-- sparkle secundario -->
  <path d="M72 16 l3.5 9 9 3.5 -9 3.5 -3.5 9 -3.5 -9 -9 -3.5 9 -3.5 z" fill="#67e8f9" opacity="0.9"/>
</svg>
